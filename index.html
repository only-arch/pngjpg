<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PNG CLEANER</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,"Malgun Gothic",sans-serif;
  background:
    radial-gradient(circle at top left,#dbeafe 0,#f8fafc 34%,transparent 35%),
    linear-gradient(135deg,#f1f5f9,#e2e8f0);
  color:#1e293b;
}
.wrap{
  width:min(980px,calc(100% - 28px));
  margin:28px auto;
}
.window{
  overflow:hidden;
  border:1px solid #94a3b8;
  border-radius:22px;
  background:#f8fafc;
  box-shadow:0 24px 70px rgba(15,23,42,.18);
}
.topbar{
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg,#334155,#1e293b);
  color:#fff;
}
.dots{display:flex;gap:8px}
.dot{width:12px;height:12px;border-radius:50%}
.red{background:#fb7185}.yellow{background:#facc15}.green{background:#4ade80}
.appname{
  font-weight:900;
  letter-spacing:.08em;
  font-size:13px;
}
.status{
  font-size:11px;
  border:1px solid rgba(255,255,255,.28);
  border-radius:999px;
  padding:6px 10px;
  color:#dbeafe;
}
.main{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:18px;
  padding:18px;
}
.panel,.viewer{
  border:1px solid #cbd5e1;
  border-radius:18px;
  background:#fff;
  box-shadow:0 10px 28px rgba(15,23,42,.06);
}
.panel{padding:18px}
h1{
  margin:0 0 8px;
  font-size:24px;
  letter-spacing:-.04em;
}
.desc{
  margin:0 0 16px;
  color:#64748b;
  font-size:13px;
  line-height:1.65;
}
.drop{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:190px;
  border:2px dashed #94a3b8;
  border-radius:18px;
  background:
    linear-gradient(45deg,rgba(226,232,240,.5) 25%,transparent 25%),
    linear-gradient(-45deg,rgba(226,232,240,.5) 25%,transparent 25%);
  background-size:22px 22px;
  text-align:center;
  cursor:pointer;
  padding:18px;
  transition:.2s;
}
.drop.drag{
  border-color:#2563eb;
  background-color:#eff6ff;
}
.drop strong{
  display:block;
  font-size:16px;
  margin-bottom:8px;
}
.drop span{
  display:block;
  color:#64748b;
  font-size:12px;
  line-height:1.55;
}
input[type=file]{display:none}
.btns{
  display:grid;
  gap:9px;
  margin-top:14px;
}
button{
  border:0;
  border-radius:13px;
  padding:13px 14px;
  font-weight:900;
  cursor:pointer;
  background:#1e293b;
  color:#fff;
}
button.secondary{
  background:#f1f5f9;
  color:#334155;
  border:1px solid #cbd5e1;
}
button:disabled{
  opacity:.35;
  cursor:not-allowed;
}
.tip{
  margin-top:14px;
  border-radius:14px;
  padding:12px;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  color:#64748b;
  font-size:12px;
  line-height:1.6;
}
.viewer{
  min-height:520px;
  overflow:hidden;
}
.viewerHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:15px 16px;
  border-bottom:1px solid #e2e8f0;
  background:#f8fafc;
}
.viewerHead b{font-size:14px}
.count{
  font-size:12px;
  color:#475569;
  background:#e2e8f0;
  border-radius:999px;
  padding:6px 10px;
}
.empty{
  height:430px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#94a3b8;
  padding:20px;
  line-height:1.7;
}
.list{
  display:grid;
  gap:12px;
  padding:14px;
}
.item{
  display:grid;
  grid-template-columns:76px 1fr auto;
  gap:14px;
  align-items:center;
  border:1px solid #e2e8f0;
  border-radius:16px;
  background:#fff;
  padding:12px;
}
.thumb{
  width:76px;
  height:76px;
  border-radius:14px;
  overflow:hidden;
  background:#e2e8f0;
  border:1px solid #cbd5e1;
}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.name{
  font-weight:900;
  word-break:break-all;
  margin-bottom:5px;
}
.meta{
  color:#64748b;
  font-size:12px;
  line-height:1.55;
}
.saveOne{white-space:nowrap}
@media(max-width:760px){
  .wrap{width:calc(100% - 18px);margin:12px auto}
  .main{grid-template-columns:1fr;padding:12px}
  .topbar{padding:0 12px}
  .status{display:none}
  .viewer{min-height:auto}
  .empty{height:220px}
  .item{grid-template-columns:64px 1fr}
  .thumb{width:64px;height:64px}
  .saveOne{grid-column:1/-1}
  .saveOne button{width:100%}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="window">
    <div class="topbar">
      <div class="dots">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="appname">PNG CLEANER</div>
      <div class="status">LOCAL ONLY · NO UPLOAD</div>
    </div>

    <div class="main">
      <section class="panel">
        <h1>PNG → JPG 변환</h1>
        <p class="desc">
          PNG 파일을 JPG로 다시 저장해 메타데이터를 제거하는 용도의 변환기입니다.
          모든 작업은 브라우저 안에서만 처리됩니다.
        </p>

        <label class="drop" id="drop">
          <div>
            <strong>PNG 파일 업로드</strong>
            <span>여러 장 선택 가능<br>드래그 앤 드롭 가능<br>투명 배경은 흰색으로 변환</span>
          </div>
          <input id="fileInput" type="file" accept="image/png" multiple>
        </label>

        <div class="btns">
          <button id="downloadAll" disabled>전체 순차 저장</button>
          <button id="clearAll" class="secondary" disabled>목록 초기화</button>
        </div>

        <div class="tip">
          저장 파일명은 한국 시간 기준으로<br>
          <b>YYYYMMDD_HHMMSS_001.jpg</b><br>
          형식으로 자동 생성됩니다.
        </div>
      </section>

      <section class="viewer">
        <div class="viewerHead">
          <b>CONVERT LOG</b>
          <span class="count" id="count">0 files</span>
        </div>
        <div id="empty" class="empty">
          아직 변환된 파일이 없습니다.<br>
          PNG 파일을 올리면 이곳에 변환 로그가 표시됩니다.
        </div>
        <div id="list" class="list"></div>
      </section>
    </div>
  </div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const drop = document.getElementById("drop");
const list = document.getElementById("list");
const empty = document.getElementById("empty");
const count = document.getElementById("count");
const downloadAll = document.getElementById("downloadAll");
const clearAll = document.getElementById("clearAll");

let converted = [];

function pad(n){return String(n).padStart(2,"0")}

function makeFileName(index){
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}_${String(index).padStart(3,"0")}.jpg`;
}

function formatBytes(bytes){
  if(bytes < 1024) return bytes + " B";
  if(bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1024 / 1024).toFixed(2) + " MB";
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function convertPNG(file, index){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();

    reader.onload = () => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;

        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0);

        canvas.toBlob(blob=>{
          if(!blob){
            reject(new Error("JPG 변환 실패"));
            return;
          }

          resolve({
            originalName:file.name,
            originalSize:file.size,
            width:canvas.width,
            height:canvas.height,
            blob,
            filename:makeFileName(index),
            preview:URL.createObjectURL(blob)
          });
        },"image/jpeg",0.95);
      };

      img.onerror = () => reject(new Error("이미지 로드 실패"));
      img.src = reader.result;
    };

    reader.onerror = () => reject(new Error("파일 읽기 실패"));
    reader.readAsDataURL(file);
  });
}

function render(){
  list.innerHTML = "";

  converted.forEach(item=>{
    const card = document.createElement("div");
    card.className = "item";
    card.innerHTML = `
      <div class="thumb"><img src="${item.preview}" alt=""></div>
      <div>
        <div class="name">${item.originalName}</div>
        <div class="meta">
          ${item.width} × ${item.height}px<br>
          PNG ${formatBytes(item.originalSize)} → JPG ${formatBytes(item.blob.size)}<br>
          ${item.filename}
        </div>
      </div>
      <div class="saveOne">
        <button type="button">JPG 저장</button>
      </div>
    `;

    card.querySelector("button").addEventListener("click",()=>{
      downloadBlob(item.blob,item.filename);
    });

    list.appendChild(card);
  });

  empty.style.display = converted.length ? "none" : "flex";
  count.textContent = `${converted.length} files`;
  downloadAll.disabled = converted.length === 0;
  clearAll.disabled = converted.length === 0;
}

async function handleFiles(files){
  const pngFiles = Array.from(files).filter(file=>{
    return file.type === "image/png" || file.name.toLowerCase().endsWith(".png");
  });

  if(!pngFiles.length){
    alert("PNG 파일만 업로드할 수 있습니다.");
    return;
  }

  for(let i=0;i<pngFiles.length;i++){
    try{
      const item = await convertPNG(pngFiles[i], converted.length + 1);
      converted.push(item);
      render();
    }catch(e){
      alert(`${pngFiles[i].name} 변환 실패`);
    }
  }
}

fileInput.addEventListener("change",e=>{
  handleFiles(e.target.files);
  fileInput.value = "";
});

drop.addEventListener("dragover",e=>{
  e.preventDefault();
  drop.classList.add("drag");
});

drop.addEventListener("dragleave",()=>{
  drop.classList.remove("drag");
});

drop.addEventListener("drop",e=>{
  e.preventDefault();
  drop.classList.remove("drag");
  handleFiles(e.dataTransfer.files);
});

downloadAll.addEventListener("click",async()=>{
  for(let i=0;i<converted.length;i++){
    downloadBlob(converted[i].blob, converted[i].filename);
    await new Promise(resolve=>setTimeout(resolve,450));
  }
});

clearAll.addEventListener("click",()=>{
  converted.forEach(item=>URL.revokeObjectURL(item.preview));
  converted = [];
  render();
});

render();
</script>
</body>
</html>
